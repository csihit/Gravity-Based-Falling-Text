<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Gravity Playground</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="stars"></div>

<div id="canvas-container">
  <div id="title">✨ Gravity Playground ✨</div>
  <div id="ui">
    <input type="text" id="textInput" placeholder="Type something..." value="" maxlength="16">
    <button id="dropBtn">🔤 Drop Text</button>
    <button id="clearBtn" class="secondary">🧹 Clear</button>
    <button id="gravityBtn" class="secondary">🔄 Flip Gravity</button>
  </div>
  <div id="hint">Click anywhere to drop a letter</div>
  <canvas id="myCanvas"></canvas>
</div>

<script src="script.js"></script>
</body>
</html>
